name: 约拍后端质量检查

on:
  pull_request:
    branches:
      - main
    paths:
      - "ruoyi-fastapi-backend/**"
      - ".github/workflows/backend-check.yml"
  push:
    branches:
      - feat/production-readiness-mvp
    paths:
      - "ruoyi-fastapi-backend/**"
      - ".github/workflows/backend-check.yml"

permissions:
  contents: read

jobs:
  backend-check:
    name: Python编译与Ruff检查
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ruoyi-fastapi-backend

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装Ruff
        run: python -m pip install --upgrade ruff==0.15.0

      - name: 编译约拍模块
        run: python -m compileall -q module_yuepai

      - name: Ruff检查约拍模块
        run: ruff check module_yuepai
