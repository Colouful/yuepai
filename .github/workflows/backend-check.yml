name: 约拍后端质量检查

on:
  pull_request:
    branches:
      - main
    paths:
      - "ruoyi-fastapi-backend/**"
      - ".github/workflows/backend-check.yml"

permissions:
  contents: read

jobs:
  backend-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ruoyi-fastapi-backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install ruff pydantic
      - run: python -m compileall -q module_yuepai
      - run: ruff check module_yuepai tests/test_yuepai_core_vo.py
      - run: python -m unittest discover -s tests -p "test_yuepai_*.py" -v
